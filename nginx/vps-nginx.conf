# /etc/nginx/sites-available/oldkhiva.uz
# Symlink: ln -s /etc/nginx/sites-available/oldkhiva.uz /etc/nginx/sites-enabled/

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name oldkhiva.uz www.oldkhiva.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://oldkhiva.uz$request_uri;
    }
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.oldkhiva.uz;

    ssl_certificate     /etc/letsencrypt/live/oldkhiva.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oldkhiva.uz/privkey.pem;

    return 301 https://oldkhiva.uz$request_uri;
}

# Main HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oldkhiva.uz;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/oldkhiva.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oldkhiva.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    # Proxy to Docker nginx on port 8091
    location / {
        proxy_pass         http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300;
        proxy_buffering    off;
    }
}
